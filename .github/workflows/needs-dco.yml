name: Needs DCO Signoff

on:
  workflow_call:

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  needs-dco:
    runs-on: ubuntu-latest
    steps:
      - name: Check for DCO signoff and label PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const LABEL = 'needs-dco';
            const COMMENT_MARKER = '<!-- needs-dco-bot -->';

            async function getUnsignedCommits(prNumber) {
              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              return commits.filter(c => !c.commit.message.includes('Signed-off-by:'));
            }

            async function findBotComment(prNumber) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });
              return comments.find(c => c.body.includes(COMMENT_MARKER));
            }

            async function hasLabel(prNumber) {
              const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });
              return labels.some(l => l.name === LABEL);
            }

            async function ensureLabel() {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: LABEL,
                });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: LABEL,
                    color: 'E4E669',
                    description: 'Commits are missing a Signed-off-by line',
                  });
                  core.info(`Created '${LABEL}' label in this repo`);
                }
              }
            }

            async function handlePR(prNumber, author, baseBranch) {
              const unsigned = await getUnsignedCommits(prNumber);
              const alreadyLabeled = await hasLabel(prNumber);
              const existingComment = await findBotComment(prNumber);

              if (unsigned.length > 0) {
                await ensureLabel();

                if (!alreadyLabeled) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    labels: [LABEL],
                  });
                  core.info(`PR #${prNumber}: added '${LABEL}' label`);
                }

                if (!existingComment) {
                  const commitList = unsigned.map(c =>
                    `- [\`${c.sha.slice(0, 7)}\`](${c.html_url}): ${c.commit.message.split('\n')[0]}`
                  ).join('\n');

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: [
                      COMMENT_MARKER,
                      `Hi @${author}! :wave: One or more commits in this PR are missing a \`Signed-off-by\` line, which is required by our [DCO policy](https://krkn-chaos.dev/docs/contribution-guidelines/git-pointers/#developers-certificate-of-origin).`,
                      ``,
                      `**Unsigned commits:**`,
                      commitList,
                      ``,
                      `**To fix, rebase and sign off all commits:**`,
                      `\`\`\`bash`,
                      `git rebase HEAD~${unsigned.length} --signoff`,
                      `git push --force-with-lease`,
                      `\`\`\``,
                      ``,
                      `Or, to sign off every commit in this PR at once:`,
                      `\`\`\`bash`,
                      `git rebase origin/${baseBranch} --signoff`,
                      `git push --force-with-lease`,
                      `\`\`\``,
                      ``,
                      `> **Tip:** Add \`-s\` to future \`git commit\` commands (e.g. \`git commit -s -m "..."\`) to sign off automatically.`,
                      ``,
                      `> **Note:** Please make sure your PR contains only **1 commit** before signing off. If you have multiple commits, squash them first:`,
                      `> \`\`\`bash`,
                      `> git checkout <my-working-branch>`,
                      `> git rebase -i HEAD~<num_of_commits_to_merge>`,
                      `>    -OR-`,
                      `> git rebase -i <commit_id_of_first_change_commit>`,
                      `> \`\`\``,
                      `> In the interactive rebase screen, set the first commit to \`pick\` and all others to \`squash\`. Then push your rebased commits:`,
                      `> \`\`\`bash`,
                      `> git push origin <my-working-branch> --force-with-lease`,
                      `> \`\`\``,
                      `> See the [Squash Commits](https://krkn-chaos.dev/docs/contribution-guidelines/git-pointers/#squash-commits) guide for more details.`,
                      ``,
                      `The \`${LABEL}\` label and this comment will be removed automatically once all commits are signed off.`,
                    ].join('\n'),
                  });
                  core.info(`PR #${prNumber}: posted needs-dco comment`);
                }
                core.setFailed(`PR #${prNumber}: ${unsigned.length} commit(s) are missing a Signed-off-by line`);
              } else {
                if (alreadyLabeled) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    name: LABEL,
                  });
                  core.info(`PR #${prNumber}: removed '${LABEL}' label`);
                }

                if (existingComment) {
                  await github.rest.issues.deleteComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: existingComment.id,
                  });
                  core.info(`PR #${prNumber}: removed needs-dco comment`);
                }
              }
            }

            if (context.eventName === 'pull_request_target') {
              const prNumber = context.payload.pull_request.number;
              const author = context.payload.pull_request.user.login;
              const baseBranch = context.payload.pull_request.base.ref;
              core.info(`Triggered by PR #${prNumber} (${context.payload.action})`);
              try {
                await handlePR(prNumber, author, baseBranch);
              } catch (e) {
                core.warning(`PR #${prNumber}: unexpected error — ${e.message}`);
              }

            } else if (context.eventName === 'push') {
              const pushedBranch = context.ref.replace('refs/heads/', '');
              core.info(`Triggered by push to ${pushedBranch} — checking all open PRs`);
              const prs = await github.paginate(github.rest.pulls.list, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                base: pushedBranch,
              });
              core.info(`Found ${prs.length} open PRs targeting ${pushedBranch}`);
              const CONCURRENCY = 5;
              for (let i = 0; i < prs.length; i += CONCURRENCY) {
                const batch = prs.slice(i, i + CONCURRENCY);
                await Promise.all(batch.map(pr =>
                  handlePR(pr.number, pr.user.login, pr.base.ref).catch(e =>
                    core.warning(`PR #${pr.number}: unexpected error — ${e.message}`)
                  )
                ));
              }
            }
